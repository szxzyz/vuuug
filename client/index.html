    <script async src="https://richinfo.co/richpartners/telegram/js/tg-ob.js" id="richads-sdk"></script>
    <script>
      (function() {
        function initRichads() {
          if (typeof TelegramAdsController !== 'undefined') {
            window.TelegramAdsController = new TelegramAdsController();
            window.TelegramAdsController.initialize({ pubId: "1014157", appId: "7733" });
          }
        }
        var sdk = document.getElementById('richads-sdk');
        if (sdk) {
          sdk.addEventListener('load', initRichads);
        }
        document.addEventListener('DOMContentLoaded', initRichads);
      })();
